<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horizontal Mind Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden}
#app{width:100vw;height:100vh;overflow:hidden;background:#f5f4f0;position:relative;user-select:none;touch-action:none}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
svg.lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.node{position:absolute;background:#fff;border:1.5px solid #ccc;border-radius:6px;padding:7px 12px;cursor:grab;min-width:110px;max-width:180px;font-size:13px;color:#222;line-height:1.3;transition:box-shadow 0.1s,border-color 0.1s}
.node:active{cursor:grabbing}
.node.root{border-color:#534AB7;border-width:2px;font-weight:500;background:#EEEDFE;color:#26215C}
.node.selected{border-color:#1D9E75!important;border-width:2px!important;box-shadow:0 0 0 3px rgba(159,225,203,0.4)}
.node-title{outline:none;min-width:20px;display:inline-block;max-width:140px;word-break:break-word}
.toggle-btn{position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:#fff;border:1.5px solid #ccc;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#666;z-index:10}
.toggle-btn:hover{background:#f0f0f0}
.add-btn{position:absolute;right:-28px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;color:#fff;z-index:11;line-height:1}
.node.selected .add-btn{display:flex}
.node.selected.has-toggle .add-btn{right:-46px}
.toolbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20;background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:6px 12px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.tbtn{background:none;border:none;cursor:pointer;font-size:13px;color:#666;padding:4px 8px;border-radius:12px}
.tbtn:hover{background:#f0f0f0;color:#222}
.seg{width:0.5px;height:16px;background:#ddd}
.hint{position:absolute;top:10px;left:12px;font-size:11px;color:#999;pointer-events:none}
.lmbtn{font-size:11px;color:#666;padding:3px 9px;border-radius:10px;border:0.5px solid #ddd;cursor:pointer;background:none}
.lmbtn.active{background:#f0f0f0;color:#222}
.lmbtn:hover{background:#f0f0f0}
</style>
</head>
<body>
<div id="app">
  <div class="hint">click to select · green + adds child · drag to move · ctrl+scroll to zoom · scroll to pan</div>
  <div id="canvas">
    <svg class="lines" id="svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L6.5,3 z" fill="#888780"/>
        </marker>
        <marker id="arr-p" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L6.5,3 z" fill="#534AB7"/>
        </marker>
        <marker id="arr-g" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L6.5,3 z" fill="#1D9E75"/>
        </marker>
      </defs>
    </svg>
  </div>
  <div class="toolbar">
    <button class="tbtn" onclick="zoom(0.12)" title="Zoom in">＋</button>
    <button class="tbtn" onclick="zoom(-0.12)" title="Zoom out">－</button>
    <button class="tbtn" onclick="resetView()" title="Reset view">⌖ reset</button>
    <div class="seg"></div>
    <button class="lmbtn active" id="btn-elbow" onclick="setMode('elbow')">⌐ elbow</button>
    <button class="lmbtn" id="btn-straight" onclick="setMode('straight')">/ straight</button>
    <div class="seg"></div>
    <button class="tbtn" onclick="addToSelected()">＋ node</button>
  </div>
</div>
<script>
const app = document.getElementById('app');
const canvas = document.getElementById('canvas');
const svgEl = document.getElementById('svg');

let scale = 1, panX = 20, panY = 30;
let nodes = {}, idSeq = 0, lineMode = 'elbow', selectedId = null;
const NW = 130, NH = 36, GX = 60, GY = 14, R = 10;

function mkId() { return 'n' + (++idSeq); }
function mk(id, label, parentId, depth) {
  nodes[id] = { id, label, parentId, children: [], collapsed: false, x: 0, y: 0, depth };
}

function initTree() {
  mk('root', 'Project Map', null, 0);
  const branches = {
    'Design': ['UI/UX', 'Branding', 'Prototyping'],
    'Development': ['Frontend', 'Backend', 'Testing'],
    'Research': ['Surveys', 'Analysis', 'Reports']
  };
  Object.entries(branches).forEach(([label, subs]) => {
    const id = mkId(); mk(id, label, 'root', 1); nodes['root'].children.push(id);
    subs.forEach(s => { const sid = mkId(); mk(sid, s, id, 2); nodes[id].children.push(sid); });
  });
}

function treeH(id) {
  const n = nodes[id];
  if (n.collapsed || !n.children.length) return NH;
  return Math.max(n.children.reduce((a, c) => a + treeH(c) + GY, 0) - GY, NH);
}

function layout() {
  function place(id, x, y) {
    const n = nodes[id];
    if (n.collapsed || !n.children.length) { n.x = x; n.y = y; return; }
    const h = treeH(id);
    n.x = x; n.y = y + h / 2 - NH / 2;
    let cy = y;
    n.children.forEach(cid => { const ch = treeH(cid); place(cid, x + NW + GX, cy); cy += ch + GY; });
  }
  const total = treeH('root');
  place('root', 30, Math.max(0, (window.innerHeight / scale - total) / 2));
}

function isVis(id) {
  if (id === 'root') return true;
  const n = nodes[id];
  return n.parentId && !nodes[n.parentId].collapsed && isVis(n.parentId);
}

function select(id) {
  selectedId = (selectedId === id) ? null : id;
  canvas.querySelectorAll('.node').forEach(el => {
    el.classList.toggle('selected', el.dataset.nid === selectedId);
  });
  drawLines();
}

function renderAll() {
  layout();
  canvas.querySelectorAll('.node').forEach(e => e.remove());
  const defs = svgEl.querySelector('defs');
  svgEl.innerHTML = ''; svgEl.appendChild(defs);

  Object.values(nodes).forEach(n => {
    if (!isVis(n.id)) return;
    const el = document.createElement('div');
    const hasTgl = n.children.length > 0;
    el.className = 'node' + (n.id === 'root' ? ' root' : '') + (n.id === selectedId ? ' selected' : '') + (hasTgl ? ' has-toggle' : '');
    el.id = 'nd-' + n.id; el.dataset.nid = n.id;
    el.style.cssText = `left:${n.x}px;top:${n.y}px;width:${NW}px;min-height:${NH}px`;

    const span = document.createElement('span');
    span.className = 'node-title'; span.contentEditable = 'true'; span.spellcheck = false; span.innerText = n.label;
    span.addEventListener('input', () => { n.label = span.innerText; });
    span.addEventListener('mousedown', e => e.stopPropagation());
    el.appendChild(span);

    if (hasTgl) {
      const btn = document.createElement('div');
      btn.className = 'toggle-btn'; btn.textContent = n.collapsed ? '+' : '–';
      btn.addEventListener('click', e => { e.stopPropagation(); n.collapsed = !n.collapsed; renderAll(); });
      el.appendChild(btn);
    }

    const abtn = document.createElement('div');
    abtn.className = 'add-btn'; abtn.textContent = '+'; abtn.title = 'Add child node';
    abtn.addEventListener('click', e => { e.stopPropagation(); addChildTo(n.id); });
    el.appendChild(abtn);

    el.addEventListener('mousedown', e => {
      if (e.target.contentEditable === 'true' || e.target.className === 'toggle-btn' || e.target.className === 'add-btn') return;
      startDrag(e, n.id);
    });
    el.addEventListener('click', e => {
      if (e.target.contentEditable === 'true' || e.target.className === 'toggle-btn' || e.target.className === 'add-btn') return;
      if (!wasDragged) select(n.id);
    });
    canvas.appendChild(el);
  });
  drawLines();
}

let wasDragged = false;
function startDrag(e, id) {
  let sx = e.clientX, sy = e.clientY, ox = nodes[id].x, oy = nodes[id].y;
  wasDragged = false;
  function onMove(e) {
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) wasDragged = true;
    nodes[id].x = ox + dx / scale; nodes[id].y = oy + dy / scale;
    const el = document.getElementById('nd-' + id);
    if (el) { el.style.left = nodes[id].x + 'px'; el.style.top = nodes[id].y + 'px'; }
    drawLines();
  }
  function onUp() { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  e.preventDefault();
}

function elbowPath(px, py, cx, cy) {
  const midX = px + GX / 2;
  const dy = cy - py;
  const r = Math.min(R, Math.abs(dy) / 2, (midX - px) / 2, (cx - midX) / 2);
  if (r < 1 || Math.abs(dy) < 1) return `M${px},${py} L${cx},${cy}`;
  const sy = dy > 0 ? 1 : -1;
  return `M${px},${py} L${midX - r},${py} Q${midX},${py} ${midX},${py + sy * r} L${midX},${cy - sy * r} Q${midX},${cy} ${midX + r},${cy} L${cx},${cy}`;
}

function drawLines() {
  const defs = svgEl.querySelector('defs');
  svgEl.innerHTML = ''; svgEl.appendChild(defs);
  Object.values(nodes).forEach(n => {
    if (!n.parentId || !isVis(n.id) || !isVis(n.parentId)) return;
    const p = nodes[n.parentId];
    const isRoot = (n.parentId === 'root');
    const isSel = (n.id === selectedId || n.parentId === selectedId);
    const stroke = isRoot ? '#534AB7' : isSel ? '#1D9E75' : '#888780';
    const markerRef = isRoot ? 'url(#arr-p)' : isSel ? 'url(#arr-g)' : 'url(#arr)';
    const px = p.x + NW, py = p.y + NH / 2, cx = n.x, cy = n.y + NH / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = lineMode === 'elbow' ? elbowPath(px, py, cx, cy) : `M${px},${py} L${cx},${cy}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', isSel ? '2' : '1.5');
    path.setAttribute('marker-end', markerRef);
    svgEl.appendChild(path);
  });
}

function addChildTo(parentId) {
  if (!parentId) return;
  const id = mkId();
  const depth = (nodes[parentId].depth || 0) + 1;
  mk(id, 'New node', parentId, depth);
  nodes[parentId].children.push(id);
  nodes[parentId].collapsed = false;
  selectedId = id;
  renderAll();
  setTimeout(() => {
    const el = document.getElementById('nd-' + id);
    if (el) { const span = el.querySelector('.node-title'); if (span) { span.focus(); document.execCommand('selectAll', false, null); } }
  }, 50);
}

function addToSelected() { addChildTo(selectedId || 'root'); }

function applyT() { canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }
function zoom(d) { scale = Math.max(0.25, Math.min(2.5, scale + d)); applyT(); }
function resetView() { scale = 1; panX = 20; panY = 30; applyT(); }
function setMode(m) {
  lineMode = m;
  document.getElementById('btn-elbow').className = 'lmbtn' + (m === 'elbow' ? ' active' : '');
  document.getElementById('btn-straight').className = 'lmbtn' + (m === 'straight' ? ' active' : '');
  drawLines();
}

let panning = false, psx, psy, pox, poy;
app.addEventListener('mousedown', e => {
  if (e.target !== app) return;
  panning = true; psx = e.clientX; psy = e.clientY; pox = panX; poy = panY;
  selectedId = null;
  canvas.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
  drawLines();
});
window.addEventListener('mousemove', e => { if (!panning) return; panX = pox + (e.clientX - psx); panY = poy + (e.clientY - psy); applyT(); });
window.addEventListener('mouseup', () => { panning = false; });
app.addEventListener('wheel', e => {
  e.preventDefault(); e.stopPropagation();
  if (e.ctrlKey || e.metaKey) { zoom(e.deltaY < 0 ? 0.08 : -0.08); }
  else { panX -= e.deltaX; panY -= e.deltaY; applyT(); }
}, { passive: false, capture: true });

initTree(); renderAll(); applyT();
</script>
</body>
</html>
