<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoDoc</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Space+Mono:wght@400;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Space Mono",Arial,sans-serif;
    overflow:hidden;
    background:white;
}

.topbar{
    height:50px;
    border-bottom:1px solid black;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    background-color:#f9f7f7;
}

.menu-btn{
    box-shadow:2px 2px 0px rgb(88,88,88);
    width:36px;
    height:36px;
    border:1px solid black;
    background:rgb(189,189,189);
    cursor:pointer;
    font-size:18px;
}

#app{
    display:flex;
    width:100%;
    height:calc(100vh - 50px);
    overflow:hidden;
}

#app-name a{
    text-decoration:none;
    color:#4451e5;
    margin-left:20px;
    font-weight:bold;
    font-size:25px;
}

.sidebar{
    font-size:18px;
    position:relative;
    width:clamp(420px,55vw,700px);
    border-right:1px solid black;
    overflow:hidden;
    transition:width 0.2s;
    background-color:#fcfafa;
}

.sidebar.hidden{
    width:0;
    border:none;
}

.tree-area{
    position:relative;
    width:100%;
    height:100%;
    overflow:auto;
}

svg{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    pointer-events:none;
    z-index:1;
    overflow:visible;
}

.columns{
    position:relative;
    display:flex;
    gap:80px;
    padding:20px;
    z-index:2;
    min-width:700px;
}

.column{
    display:flex;
    flex-direction:column;
    gap:18px;
    min-width:160px;
}

.item{
    width:160px;
    min-height:100px;
    margin:0 auto 18px auto;
    border:1px solid rgb(0,0,0);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    background:white;
    cursor:pointer;
    position:relative;
    font-size:clamp(9px,1vw,14px);
    word-break:break-word;
    overflow-wrap:break-word;
    white-space:normal;
    overflow:hidden;
    box-shadow:4px 4px 0px rgb(88,88,88);
}

.item.active{
    background:#a6d1e8;
}

.viewer{
    flex:1;
    overflow:auto;
    padding:20px;
    background:white;
}

.viewer h1,
.viewer h2,
.viewer h3{
    margin-bottom:12px;
}

.viewer p{
    margin-bottom:10px;
    line-height:1.5;
}

.viewer ul{
    padding-left:20px;
}

.viewer pre{
    background:#f4f4f4;
    padding:10px;
    overflow:auto;
    margin:10px 0;
}

#mobileMessage{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    font-size:18px;
    background:white;
}

@media(max-width:750px){
    #mobileMessage{
        display:flex;
    }

    .topbar,
    #app{
        display:none;
    }
}

@media(max-width:1200px){
    .sidebar{
        width:50%;
    }

    .columns{
        gap:48px;
        padding:10px;
        min-width:auto;
    }

    .column{
        min-width:90px;
    }

    .item{
        width:90px;
        min-height:80px;
        font-size:11px;
        padding:6px;
        border-radius:14px;
    }
}

#datetime{
    font-size:14px;
    font-weight:bold;
    padding-right:8px;
}
</style>
</head>

<body>

<div id="mobileMessage">
    This application is not made for such smaller devices.
</div>

<div class="topbar">
    <div style="display:flex;align-items:center;">
        <button class="menu-btn" id="menuBtn">☰</button>

        <span id="app-name">
            <a href="mdNotesCreater.html">CoDoc</a>
        </span>
    </div>

    <div id="datetime"></div>
</div>

<div id="app">

    <div class="sidebar" id="sidebar">

        <div class="tree-area">

            <svg id="svg"></svg>

            <div class="columns">

                <div class="column" id="rootColumn"></div>

                <div class="column" id="childColumn"></div>

                <div class="column" id="fileColumn"></div>

            </div>

        </div>

    </div>

    <div class="viewer" id="viewer">
        <h2>Select Your Notes File</h2>
    </div>

</div>

<script>
const rootColumn = document.getElementById("rootColumn");
const childColumn = document.getElementById("childColumn");
const fileColumn = document.getElementById("fileColumn");
const viewer = document.getElementById("viewer");
const svg = document.getElementById("svg");
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");

const colors = [
    "#ffd6d6",
    "#ffe7c7",
    "#fff4b8",
    "#d9ffd6",
    "#d6fff8",
    "#d6e4ff",
    "#ead6ff",
    "#ffd6f5"
];

let data = {};

async function loadData(){
    const response = await fetch("./data.json");
    data = await response.json();
    renderRoots();
}

loadData();

function clearColumn(column){
    column.innerHTML = "";
}

function clearSVG(){
    svg.innerHTML = "";
}

function createItem(text){
    const div = document.createElement("div");

    div.className = "item";
    div.textContent = text;

    const randomColor =
    colors[
        Math.floor(
            Math.random() * colors.length
        )
    ];

    div.style.background = randomColor;

    return div;
}

function setActive(column,activeElement){
    [...column.children].forEach(child => {
        child.classList.remove("active");
    });

    activeElement.classList.add("active");
}

function renderRoots(){
    clearColumn(rootColumn);

    Object.keys(data).forEach(rootName => {

        const rootItem = createItem(rootName);

        rootItem.addEventListener("click",() => {

            setActive(rootColumn,rootItem);

            openChildren(
                rootName,
                rootItem
            );
        });

        rootColumn.appendChild(rootItem);
    });
}

function openChildren(rootName,rootElement){

    clearColumn(childColumn);
    clearColumn(fileColumn);
    clearSVG();

    viewer.innerHTML =
    "<h2>Select Your Notes File</h2>";

    const children = data[rootName];

    Object.keys(children).forEach(childName => {

        const childItem =
        createItem(childName);

        childItem.addEventListener("click",() => {

            setActive(
                childColumn,
                childItem
            );

            openFiles(
                rootName,
                childName,
                childItem
            );
        });

        childColumn.appendChild(childItem);
    });

    requestAnimationFrame(() => {

        [...childColumn.children].forEach(child => {

            drawConnection(
                rootElement,
                child
            );
        });
    });
}

function openFiles(
    rootName,
    childName,
    childElement
){

    clearColumn(fileColumn);

    viewer.innerHTML =
    "<h2>Select a markdown file</h2>";

    svg
    .querySelectorAll(".file-arrow")
    .forEach(el => el.remove());

    const files =
    data[rootName][childName];

    Object.keys(files).forEach(fileName => {

        const fileItem =
        createItem(fileName);

        fileItem.addEventListener(
            "click",

            async () => {

                setActive(
                    fileColumn,
                    fileItem
                );

                const markdownPath =
                files[fileName];

                const response =
                await fetch(markdownPath);

                const markdown =
                await response.text();

                viewer.innerHTML =
                marked.parse(markdown);
            }
        );

        fileColumn.appendChild(
            fileItem
        );
    });

    requestAnimationFrame(() => {

        [...fileColumn.children]
        .forEach(file => {

            drawConnection(
                childElement,
                file,
                true
            );
        });
    });
}

function drawConnection(
    fromEl,
    toEl,
    isFileArrow = false
){

    const fromRect =
    fromEl.getBoundingClientRect();

    const toRect =
    toEl.getBoundingClientRect();

    const svgRect =
    svg.getBoundingClientRect();

    const startX =
    fromRect.right - svgRect.left;

    const startY =
    fromRect.top +
    fromRect.height/2 -
    svgRect.top;

    const endX =
    toRect.left -
    svgRect.left;

    const endY =
    toRect.top +
    toRect.height/2 -
    svgRect.top;

    const midX =
    (startX + endX)/2;

    const isMobile =
    window.innerWidth <= 700;

    const radius =
    isMobile ? 8 : 20;

    const arrowSize =
    isMobile ? 3 : 6;

    const strokeWidth =
    isMobile ? 0.2 : 0.5;

    const group =
    document.createElementNS(
        "http://www.w3.org/2000/svg",
        "g"
    );

    if(isFileArrow){
        group.classList.add(
            "file-arrow"
        );
    }

    const path =
    document.createElementNS(
        "http://www.w3.org/2000/svg",
        "path"
    );

    const d = `
        M ${startX} ${startY}
        L ${midX-radius} ${startY}
        Q ${midX} ${startY}
          ${midX}
          ${startY + radius * Math.sign(endY-startY)}
        L ${midX}
          ${endY - radius * Math.sign(endY-startY)}
        Q ${midX} ${endY}
          ${midX+radius} ${endY}
        L ${endX-arrowSize} ${endY}
    `;

    path.setAttribute("d",d);
    path.setAttribute("fill","none");
    path.setAttribute("stroke","black");
    path.setAttribute("stroke-width",strokeWidth);

    group.appendChild(path);

    const arrow =
    document.createElementNS(
        "http://www.w3.org/2000/svg",
        "polygon"
    );

    arrow.setAttribute(
        "points",
        `
        ${endX-arrowSize},${endY-arrowSize/2}
        ${endX},${endY}
        ${endX-arrowSize},${endY+arrowSize/2}
        `
    );

    arrow.setAttribute(
        "fill",
        "black"
    );

    group.appendChild(arrow);

    svg.appendChild(group);
}

menuBtn.addEventListener(
    "click",
    () => {
        sidebar.classList.toggle(
            "hidden"
        );
    }
);

window.addEventListener(
    "resize",
    () => {

        const activeRoot =
        rootColumn.querySelector(".active");

        if(activeRoot){
            activeRoot.click();
        }
    }
);

const datetime =
document.getElementById(
    "datetime"
);

function updateDateTime(){

    const now =
    new Date();

    const formatted =
    now.toLocaleString(
        "en-IN",
        {
            dateStyle:"medium",
            timeStyle:"medium"
        }
    );

    datetime.textContent =
    formatted;
}

updateDateTime();

setInterval(
    updateDateTime,
    1000
);
</script>

</body>
</html>
